{% extends 'tyokalut/base.html' %}

{% block content %}
<div class="max-w-4xl mx-auto mt-8">
    <h1 class="text-3xl font-extrabold text-brand-text-main mb-8">Omat lainat</h1>

    <div class="bg-grey-800 rounded-xl shadow-2xl overflow-hidden border border-brand-border-muted p-6">

        <div class="space-y-4">
            {% for laina in lainat %}
            
            {% include 'tyokalut/components/loan_row.html' with laina=laina %}

            {% empty %}
                <div class="text-center py-8">
                    <p class="text-brand-text-muted text-lg mb-4">Et ole vielä lainannut yhtään työkalua.</p>
                    <a href="{% url 'tyokalu_lista' %}" class="inline-block bg-brand-primary hover:bg-brand-primary-hover text-brand-text-main 
                    font-bold py-2 px-6 rounded-lg transition-colors">
                        Selaa työkaluja
                    </a>
                </div>
            {% endfor %}
        </div>

    </div>
</div>
{% endblock %}
