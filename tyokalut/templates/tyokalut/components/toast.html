<div x-data="{ show: true }" 
     x-show="show" 
     x-init="setTimeout(() => show = false, 4000)"
     x-transition:enter="transition ease-out duration-300"
     x-transition:enter-start="opacity-0 translate-x-10"
     x-transition:enter-end="opacity-100 translate-x-0"
     x-transition:leave="transition ease-in duration-200"
     x-transition:leave-start="opacity-100 translate-x-0"
     x-transition:leave-end="opacity-0 translate-x-10"
     class="flex items-start justify-between p-4 rounded-xl shadow-2xl border border-brand-border bg-brand-surface w-80 max-w-[90vw] mt-3">
     
    <div class="flex items-center gap-3">
        {% if message.tags == 'success' %}
            <span class="w-3 h-3 rounded-full bg-brand-success shadow-[0_0_8px_rgba(34,197,94,0.6)] flex-shrink-0"></span>
        {% elif message.tags == 'error' %}
            <span class="w-3 h-3 rounded-full bg-brand-danger shadow-[0_0_8px_rgba(239,68,68,0.6)] flex-shrink-0"></span>
        {% else %}
            <span class="w-3 h-3 rounded-full bg-brand-primary flex-shrink-0"></span>
        {% endif %}
        <span class="text-brand-text-main text-sm font-semibold pr-2">{{ message }}</span>
    </div>

    <button @click="show = false" aria-label="Sulje ilmoitus" class="text-brand-text-muted hover:text-brand-text-main focus:outline-none focus:ring-2 focus:ring-brand-primary-light focus:ring-offset-2 focus:ring-offset-brand-surface rounded transition-colors flex-shrink-0 mt-0.5">
        <svg aria-hidden="true" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
    </button>
</div>
