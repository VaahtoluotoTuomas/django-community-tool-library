{% comment %}
  Argumentit: 
  - text: Napin teksti
  - type: 'primary', 'success', 'danger', 'secondary' (oletus: primary)
  - is_submit: true/false (oletus: true)
{% endcomment %}

<button 
    type="{% if is_submit|default:True %}submit{% else %}button{% endif %}"
    class="w-full md:w-auto font-bold py-2 px-6 rounded-lg transition-colors border shadow-sm
    {% if type == 'success' %}
        bg-brand-success hover:bg-green-500 text-white border-green-500
    {% elif type == 'danger' %}
        bg-gray-700 hover:bg-gray-600 text-gray-300 border-brand-border
    {% elif type == 'secondary' %}
        bg-transparent hover:bg-brand-surface text-brand-text-muted border-brand-border
    {% else %}
        bg-brand-primary hover:bg-blue-500 text-white border-blue-500
    {% endif %}"
>
    {{ text }}
</button>
