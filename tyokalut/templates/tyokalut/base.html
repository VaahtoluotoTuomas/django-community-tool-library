{% load static %}
<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Lainaamo{% endblock %}</title>
    <meta name="description" content="Taloyhtiön yhteinen työkalu- ja välinelainaamo. Säästä tilaa ja luontoa lainaamalla työkalut naapurilta.">
    <link rel="stylesheet" href="{% static 'tyokalut/css/output.css' %}">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body class="bg-brand-bg min-h-screen">

    <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 focus:z-50 bg-brand-primary text-brand-text-main p-4 rounded-lg shadow-2xl font-bold focus:outline-none focus:ring-4 focus:ring-brand-primary-light">
        Hyppää suoraan sisältöön
    </a>

    {% include 'tyokalut/components/navbar.html' %}

    <div id="toast-container" class="fixed top-5 right-5 z-50 flex flex-col">
        {% for message in messages %}
            {% include 'tyokalut/components/toast.html' %}
        {% endfor %}
    </div>

    <main id="main-content" class="container mx-auto px-4 pb-12 focus:outline-none" tabindex="-1">
        {% block content %}
        {% endblock %}
    </main>
</body>
</html>
