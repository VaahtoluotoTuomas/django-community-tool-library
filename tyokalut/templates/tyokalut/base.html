{% load static %}
<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lainaamo</title>
    <link rel="stylesheet" href="{% static 'tyokalut/css/output.css' %}">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body class="bg-brand-bg min-h-screen">

    {% include 'tyokalut/components/navbar.html' %}

    <div id="toast-container" class="fixed top-5 right-5 z-50 flex flex-col">
        {% for message in messages %}
            {% include 'tyokalut/components/toast.html' %}
        {% endfor %}
    </div>

    <main class="container mx-auto px-4 pb-12">
        {% block content %}
        {% endblock %}
    </main>
</body>
</html>
