{% extends 'tyokalut/base.html' %}

{% block content %}
<div class="max-w-md mx-auto mt-12">
    <div class="bg-gray-800 rounded-xl shadow-2xl overflow-hidden border border-gray-700 p-8">
        
        <h1 class="text-3xl font-extrabold text-white mb-6 text-center">Luo uusi tunnus</h1>

        <form method="POST" class="space-y-6">
            {% csrf_token %}
            
            <div class="
                [&_p]:mb-4 
                [&_label]:block [&_label]:text-sm [&_label]:font-medium [&_label]:text-gray-300 [&_label]:mb-1 
                [&_input]:w-full [&_input]:bg-gray-700 [&_input]:border [&_input]:border-gray-600 [&_input]:rounded-lg [&_input]:p-2.5 [&_input]:text-white 
                focus:[&_input]:ring-2 focus:[&_input]:ring-blue-500 focus:[&_input]:border-transparent 
                [&_ul.errorlist]:text-red-400 [&_ul.errorlist]:text-sm [&_ul.errorlist]:mt-1 [&_ul.errorlist]:list-disc [&_ul.errorlist]:ml-4
                [&_ul]:text-gray-400 [&_ul]:text-xs [&_ul]:mt-2 [&_ul]:list-disc [&_ul]:ml-4
                [&_span.helptext]:text-gray-400 [&_span.helptext]:text-xs [&_span.helptext]:block [&_span.helptext]:mt-1">
                {{ form.as_p }}
            </div>

            <button type="submit" class="w-full bg-green-600 hover:bg-green-500 text-white font-bold py-3 px-4 rounded-lg 
            transition-colors border border-green-500 hover:border-green-400">
                Rekisteröidy
            </button>
        </form>

        <div class="mt-6 text-center">
            <p class="text-gray-400 text-sm">
                Oletko jo asiakas? 
                <a href="{% url 'kirjaudu' %}" class="text-blue-400 hover:text-blue-300 font-semibold transition-colors">
                    Kirjaudu sisään
                </a>
            </p>
        </div>
        
    </div>
</div>
{% endblock %}
