{% extends 'tyokalut/base.html' %}

{% block content %}
<div class="max-w-md mx-auto mt-12">
    <div class="bg-brand-surface rounded-xl shadow-2xl overflow-hidden border border-brand-border-muted p-8">

        <h1 class="text-3xl font-extrabold text-brand-text-main mb-6 text-center">Kirjaudu sisään</h1>

        <form method="POST" class="space-y-6">
            {% csrf_token %}

            {% include 'tyokalut/components/form_wrapper.html' with form=form %}

            {% include 'tyokalut/components/button.html' with text='Kirjaudu' %}
        </form>

        <div class="mt-6 text-center">
            <p class="text-brand-text-muted text-sm">
                Eikö sinulla ole vielä tunnusta?
                <a href="{% url 'rekisteroidy' %}" class="text-brand-primary-light hover:text-brand-primary-light font-semibold transition-colors">
                    Rekisteröidy tästä
                </a>
            </p>

        </div>
    </div>
</div>
{% endblock %}
