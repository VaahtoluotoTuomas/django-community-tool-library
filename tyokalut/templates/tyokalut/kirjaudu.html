{% extends 'tyokalut/base.html' %}

{% block content %}
<div class="max-w-md mx-auto mt-12">
    <div class="bg-gray-800 rounded-xl shadow-2xl overflow-hidden border border-gray-700 p-8">

        <h1 class="text-3xl font-extrabold text-white mb-6 text-center">Kirjaudu sisään</h1>

        <form method="POST" class="space-y-6">
            {% csrf_token %}

            <div class="
            [&_p]:mb-4 [&_label]:block [&_label]:text-sm [&_label]:font-medium [&_label]:text-gray-300 [&_label]:mb-1 
            [&_input]:w-full [&_input]:bg-gray-700 [&_input]:border [&_input]:border-gray-600 [&_input]:rounded-lg 
            [&_input]:p-2.5 [&_input]:text-white focus:[&_input]:ring-2 focus:[&_input]:ring-blue-500 focus:[&_input]:border-transparent 
            [&_ul]:text-red-400 [&_ul]:text-sm [&_ul]:mt-1 [&_span.helptext]:text-gray-500 [&_span.helptext]:text-xs 
            [&_span.helptext]:block [&_span.helptext]:mt-1">
                {{ form.as_p }}
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-4 rounded-lg 
            transition-colors border border-blue-500 hover:border-blue-400">
                Kirjaudu
            </button>
        </form>

        <div class="mt-6 text-center">
            <p class="text-gray-400 text-sm">
                Eikö sinulla ole vielä tunnusta?
                <a href="{% url 'rekisteroidy' %}" class="text-blue-400 hover:text-blue-300 font-semibold transition-colors">
                    Rekisteröidy tästä
                </a>
            </p>

        </div>
    </div>
</div>
{% endblock %}
